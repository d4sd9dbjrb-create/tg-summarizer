{% extends "base.html" %}
{% block content %}
<section class="card narrow">
  <h2>Согласие</h2>
  <form method="post" action="/tos-accept">
    <label class="check">
      <input type="checkbox" name="accept_tos" />
      Я прочитал и принимаю
      <a href="/tos" target="_blank">Пользовательское соглашение</a>
      и <a href="/privacy" target="_blank">Политику приватности</a>.
    </label>
    <label class="check">
      <input type="checkbox" name="accept_risk" />
      Я понимаю, что сервис подключается к моему Telegram-аккаунту как userbot,
      что технически нарушает ToS Telegram и теоретически может привести
      к блокировке аккаунта. Я использую сервис на свой риск.
    </label>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <button class="btn primary" type="submit">Согласен, продолжить</button>
  </form>
  <div class="step">Шаг 2 из 4</div>
</section>
{% endblock %}
